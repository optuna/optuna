name: Sphinx

on:
  push:
    branches:
      - master
  pull_request: {}
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  documentation:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: 3.12
        enable-cache: true

    # note (crcrpar): We've not updated tutorial frequently enough so far thus
    # it'd be okay to discard cache by any small changes including typo fix under tutorial directory.
    - name: Sphinx Gallery Cache
      uses: actions/cache@v3
      env:
        cache-name: sphx-glry-documentation
      with:
        path: |
          tutorial/MNIST
          docs/source/tutorial
        key: py3.12-${{ env.cache-name }}-${{ hashFiles('tutorial/**/*') }}

    - name: Install Dependencies
      run: |
        sudo apt-get install optipng graphviz
        uv sync --extra document

    - name: Output installed packages
      run: |
        uv pip freeze
    - name: Output dependency tree
      run: |
        uv tree

    - name: Build Document
      run: |
        cd docs
        uv run make html
        cd ../

    - uses: actions/upload-artifact@v4
      with:
        name: built-html
        path: |
            docs/build/html

    - uses: actions/upload-artifact@v4
      with:
        name: tutorial
        path: |
            docs/source/tutorial

  doctest:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: 3.12
        enable-cache: true

    - name: Sphinx Gallery Cache
      uses: actions/cache@v3
      env:
        cache-name: sphx-glry-doctest
      with:
        path: |
          tutorial/MNIST
          docs/source/tutorial
        key: py3.12-${{ env.cache-name }}-${{ hashFiles('tutorial/**/*') }}

    - name: Install Dependencies
      run: |
        sudo apt-get install optipng graphviz
        uv sync --extra document

    - name: Output installed packages
      run: |
        uv pip freeze
    - name: Output dependency tree
      run: |
        uv tree

    - name: Run Doctest
      run: |
        cd docs
        uv run make doctest
