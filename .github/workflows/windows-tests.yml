# Run tests on Windows, which are triggered by each master push.
# Currently, Python3.12 is only used as an environment.
# This is mainly for the sake of speed.
name: Windows tests

on:
  push:
    branches:
      - master
  pull_request: {}
  schedule:
    - cron: '0 23 * * SUN-THU'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  tests-windows:
    runs-on: windows-latest

    # Not intended for forks.
    if: (github.event_name == 'schedule' && github.repository == 'optuna/optuna') || (github.event_name != 'schedule')
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: "3.12"
        enable-cache: true

    - name: Install
      run: |
        # Install minimal dependencies and confirm that `import optuna` is successful.
        uv sync
        uv run python -c 'import optuna'
        uv run optuna --version
        uv sync --group test --extra optional
        uv pip install PyQt6 # Install PyQT for using QtAgg as matplotlib backend.
        # TODO(HideakiImamura): Remove this after fixing https://github.com/plotly/Kaleido/issues/110
        uv pip install "kaleido<=0.1.0post1"
        # TODO(nabe): <6.3.0 is a hotfix, so please remove it once the bug is fixed.
        uv pip install "plotly<6.3.0"
        # TODO(nabe): Remove the version constraint once Torch supports NumPy v2.0.0 for Windows.
        uv pip uninstall numpy
        uv pip install 'numpy<2.0.0'

    - name: Output installed packages
      run: |
        uv pip freeze
    - name: Output dependency tree
      run: |
        uv tree --group test

    - name: Scheduled tests
      if:  ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
      run: |
        uv run pytest -n 8
      env:
        SQLALCHEMY_WARN_20: 1
        MPLBACKEND: "QtAgg" # Use QtAgg as matplotlib backend.

    - name: Tests
      if:  ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
      run: |
        uv run pytest -m "not slow" -n 8
      env:
        MPLBACKEND: "QtAgg" # Use QtAgg as matplotlib backend.
